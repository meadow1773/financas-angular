<div class="content receita">
    <span class="item {{itemNomeClass}}">
        <i class="bi bi-grip-vertical drag" alt="Mover"></i>
        <i class="bi bi-currency-dollar"></i>
        {{itemNome}}
        <i class="bi bi-chevron-compact-down detalhar"></i>
    </span>
    <span class="valores {{ itemNomeClass}}">
        <input type="text" name="{{itemNomeClass}}" [attr.aria-label]="itemNome" placeholder="{{zero}}">
        <button class="detail" tabindex="-1"><i class="bi bi-info-circle"></i></button>
        <button class="add" tabindex="-1"><i class="bi bi-plus-circle"></i></button>
        <button class="rmv" tabindex="-1"><i class="bi bi-dash-circle"></i></button>
        <input type="text" name="{{itemNomeClass}}-soma" tabindex="-1" readonly>
    </span>
</div>
