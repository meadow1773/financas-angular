<div class="calendario" [style.opacity]="aberto ? 1 : 0" [style.pointer-events]="aberto ? 'auto' : 'none'">
    <mat-icon class="cal-close" alt="Fechar" (click)="alternar.emit()">cancel</mat-icon>
    <span class="ano">{{ ano }}</span>
    <span class="month-item" *ngFor="let mes of mesesAbrev" (click)="selecionaMes(mes)">{{ mes }}</span>
</div>
